openapi: "3.1.0"

info:
  title: Sentinel Gateway API
  version: "1.0.0"
  description: |
    Real-time AI agent governance layer. Intercepts tool calls, evaluates them
    against policies, and returns allow/block/review decisions with a full audit trail.

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://sentinel.internal
    description: Production

# =============================================================================
# Security
# =============================================================================
security:
  - AgentApiKey: []

components:
  securitySchemes:
    AgentApiKey:
      type: apiKey
      in: header
      name: X-Sentinel-Agent-Key
      description: >
        API key issued at agent registration. Format: `snl_<hex>`.
        Exchange for a short-lived JWT via POST /v1/auth/token.
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ---------------------------------------------------------------------------
  # Shared schemas
  # ---------------------------------------------------------------------------
  schemas:

    # --- Enums ---------------------------------------------------------------
    Verdict:
      type: string
      enum: [ALLOWED, BLOCKED, HUMAN_REVIEW]

    DecisionPath:
      type: string
      enum: [fast_path, cognitive_path]

    # --- Core Request/Response -----------------------------------------------
    ToolCallRequest:
      type: object
      required: [tool_name, arguments]
      properties:
        tool_name:
          type: string
          minLength: 1
          maxLength: 128
          example: execute_payment
        arguments:
          type: object
          description: Tool-specific arguments. Validated against policy schemas.
          example:
            amount: 75000
            currency: USD
            recipient: vendor_abc
        session_id:
          type: string
          description: Optional. Groups related tool calls in the audit graph.
          example: sess_abc123
        context:
          $ref: "#/components/schemas/RequestContext"
        metadata:
          $ref: "#/components/schemas/RequestMetadata"

    RequestContext:
      type: object
      description: Optional context used by the cognitive path judge.
      properties:
        task_description:
          type: string
          maxLength: 1000
          example: "Process Q1 vendor invoice as per contract clause 4.2"
        conversation_history:
          type: array
          maxItems: 20
          items:
            type: object
            required: [role, content]
            properties:
              role:
                type: string
                enum: [user, assistant, system]
              content:
                type: string
                maxLength: 2000
        source_documents:
          type: array
          maxItems: 5
          items:
            type: object
            properties:
              name:
                type: string
              excerpt:
                type: string
                maxLength: 2000

    RequestMetadata:
      type: object
      properties:
        agent_version:
          type: string
          example: "1.2.0"
        request_id:
          type: string
          format: uuid
          description: Client-generated idempotency key.
        timestamp:
          type: string
          format: date-time

    DecisionResponse:
      type: object
      required: [decision_id, verdict, path, latency_ms, policy_version]
      properties:
        decision_id:
          type: string
          example: dec_01hx2k3m4n5p
        verdict:
          $ref: "#/components/schemas/Verdict"
        reason:
          type: string
          description: Human-readable explanation of the decision.
          example: "Blocked: recipient matches denylist pattern admin@"
        path:
          $ref: "#/components/schemas/DecisionPath"
        latency_ms:
          type: number
          format: float
          example: 7.3
        policy_version:
          type: string
          description: Semver of the active policy that evaluated this request.
          example: "data-access-v3.1.0"
        confidence:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          description: Judge confidence (cognitive path only).
        rate_limit:
          $ref: "#/components/schemas/RateLimitInfo"

    PendingDecisionResponse:
      type: object
      description: Returned with HTTP 202 when cognitive path exceeds sync budget.
      required: [decision_id, status, poll_url, estimated_ms]
      properties:
        decision_id:
          type: string
          example: dec_01hx2k3m4n5p
        status:
          type: string
          enum: [pending]
        poll_url:
          type: string
          example: /v1/decisions/dec_01hx2k3m4n5p
        estimated_ms:
          type: integer
          example: 5000

    RateLimitInfo:
      type: object
      properties:
        tokens_remaining:
          type: integer
          example: 45
        tokens_max:
          type: integer
          example: 50
        reset_at:
          type: string
          format: date-time

    # --- Agent Registration --------------------------------------------------
    AgentRegistrationRequest:
      type: object
      required: [name, policy_group]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 64
          example: financial_analyst_agent
        policy_group:
          type: string
          description: Which policy group governs this agent's tool calls.
          example: financial
        tenant_id:
          type: string
          description: Optional. Defaults to "default" tenant.
          example: acme_corp
        metadata:
          type: object
          description: Arbitrary agent metadata (version, owner, etc.)

    AgentRegistrationResponse:
      type: object
      required: [agent_id, api_key, name, policy_group, registered_at]
      properties:
        agent_id:
          type: string
          example: agent_01hx2k3m
        api_key:
          type: string
          description: >
            Store this securely — it will NOT be shown again.
          example: snl_a3f8b2c1d4e5f6...
        name:
          type: string
        policy_group:
          type: string
        tenant_id:
          type: string
        registered_at:
          type: string
          format: date-time

    AgentInfo:
      type: object
      properties:
        agent_id:
          type: string
        name:
          type: string
        policy_group:
          type: string
        tenant_id:
          type: string
        registered_at:
          type: string
          format: date-time
        total_requests:
          type: integer
        last_active:
          type: string
          format: date-time

    # --- Auth ----------------------------------------------------------------
    TokenRequest:
      type: object
      description: Exchange an API key for a short-lived JWT.
      required: [agent_id]
      properties:
        agent_id:
          type: string
          example: agent_01hx2k3m

    TokenResponse:
      type: object
      required: [access_token, expires_in, token_type]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: TTL in seconds (900 = 15 minutes).
          example: 900

    # --- Policy --------------------------------------------------------------
    PolicyVersionInfo:
      type: object
      properties:
        id:
          type: string
        policy_group:
          type: string
        version:
          type: string
        checksum:
          type: string
        effective_from:
          type: string
          format: date-time
        effective_until:
          type: string
          format: date-time
          nullable: true
        is_active:
          type: boolean

    # --- Health --------------------------------------------------------------
    HealthResponse:
      type: object
      required: [status, version, services]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        services:
          type: object
          properties:
            redis:
              type: string
              enum: [ok, down]
            neo4j:
              type: string
              enum: [ok, down]
            ollama:
              type: string
              enum: [ok, down, circuit_open]

    # --- Errors --------------------------------------------------------------
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: rate_limit_exceeded
        message:
          type: string
          example: Token bucket exhausted. Retry after reset_at.
        details:
          type: object

# =============================================================================
# Paths
# =============================================================================
paths:

  # ---------------------------------------------------------------------------
  # Tool Call Interception — the core endpoint
  # ---------------------------------------------------------------------------
  /v1/tool-calls:
    post:
      operationId: evaluateToolCall
      summary: Evaluate a tool call against active policies
      description: |
        The primary Sentinel endpoint. Agents send their intended tool calls here
        before executing them. Sentinel returns ALLOWED / BLOCKED / HUMAN_REVIEW.

        **Sync response (HTTP 200):** Decision made within the fast-path or cognitive
        path time budget.

        **Async response (HTTP 202):** Cognitive path exceeded the sync budget.
        Poll `poll_url` until the decision is ready.
      tags: [Tool Calls]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolCallRequest"
            examples:
              payment_high_risk:
                summary: High-risk payment (triggers cognitive path)
                value:
                  tool_name: execute_payment
                  arguments:
                    amount: 75000
                    currency: USD
                    recipient: vendor_abc
                  session_id: sess_demo_001
                  context:
                    task_description: "Pay Q1 invoice per contract clause 4.2"
                    source_documents:
                      - name: contract_vendor_abc.pdf
                        excerpt: "Clause 4.2: Payment of $75,000 USD due Q1..."
              file_read_low_risk:
                summary: Low-risk file read (fast path)
                value:
                  tool_name: read_file
                  arguments:
                    path: /data/public/catalog.json
      responses:
        "200":
          description: Decision made synchronously.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionResponse"
        "202":
          description: Decision pending (cognitive path async). Poll poll_url.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingDecisionResponse"
        "401":
          description: Missing or invalid API key / JWT.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Agent rate limit exceeded.
          headers:
            X-RateLimit-Reset:
              schema:
                type: string
                format: date-time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Request body failed schema validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/decisions/{decision_id}:
    get:
      operationId: getDecision
      summary: Poll for an async decision result
      tags: [Tool Calls]
      parameters:
        - name: decision_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Decision is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionResponse"
        "202":
          description: Still pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingDecisionResponse"
        "404":
          description: Decision ID not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Agent Registry
  # ---------------------------------------------------------------------------
  /v1/agents:
    post:
      operationId: registerAgent
      summary: Register a new agent and receive an API key
      description: |
        Protected by the root admin key (`SENTINEL_ADMIN_KEY`).
        The returned `api_key` is shown only once — store it securely.
      tags: [Agents]
      security:
        - AgentApiKey: []    # admin key required
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRegistrationRequest"
      responses:
        "201":
          description: Agent registered. API key issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRegistrationResponse"
        "409":
          description: Agent with this name already exists in the tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/agents/{agent_id}:
    get:
      operationId: getAgent
      summary: Get agent info and usage stats
      tags: [Agents]
      parameters:
        - name: agent_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInfo"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /v1/auth/token:
    post:
      operationId: issueJWT
      summary: Exchange API key for a short-lived JWT
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Policies
  # ---------------------------------------------------------------------------
  /v1/policies:
    get:
      operationId: listPolicies
      summary: List all policy versions grouped by policy_group
      tags: [Policies]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PolicyVersionInfo"

  /v1/policies/{policy_group}/activate:
    post:
      operationId: activatePolicy
      summary: Activate a specific policy version
      description: Deactivates the current version and activates the specified one.
      tags: [Policies]
      parameters:
        - name: policy_group
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version]
              properties:
                version:
                  type: string
                  example: "3.1.0"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyVersionInfo"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # WebSocket
  # ---------------------------------------------------------------------------
  /ws/dashboard:
    get:
      operationId: dashboardWebSocket
      summary: Real-time event stream for the dashboard
      description: |
        Upgrade to WebSocket. Auth via `?token=<short-lived JWT>`.

        **Event types published:**
        - `tool_call_decision` — every decision (ALLOWED / BLOCKED / HUMAN_REVIEW)
        - `rate_limit_hit` — when an agent's token bucket is exhausted
        - `circuit_breaker_state_change` — Ollama circuit transitions
        - `policy_activated` — when a new policy version goes live
        - `agent_registered` — new agent added

        **Heartbeat:** Server sends `{type: "ping"}` every 30s. Client should respond
        with `{type: "pong"}` or the connection will be closed after 2 missed pings.
      tags: [WebSocket]
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Short-lived JWT issued by POST /v1/auth/token.
      responses:
        "101":
          description: Switching Protocols — WebSocket upgrade successful.

  # ---------------------------------------------------------------------------
  # Health / Observability
  # ---------------------------------------------------------------------------
  /health:
    get:
      operationId: healthCheck
      summary: Liveness and dependency health
      tags: [Observability]
      security: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more critical services are down.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /metrics:
    get:
      operationId: prometheusMetrics
      summary: Prometheus metrics scrape endpoint
      tags: [Observability]
      security: []
      responses:
        "200":
          description: Prometheus text format metrics.
          content:
            text/plain:
              schema:
                type: string

tags:
  - name: Tool Calls
    description: Core governance interception endpoints
  - name: Agents
    description: Agent registration and management
  - name: Auth
    description: Authentication and token management
  - name: Policies
    description: Policy version management
  - name: WebSocket
    description: Real-time event streaming
  - name: Observability
    description: Health checks and metrics
