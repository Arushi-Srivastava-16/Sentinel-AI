name: Publish sentinel-sdk to PyPI

# Triggered when a version tag is pushed, e.g.: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing (no API token needed)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatch build

      - name: Build wheel and sdist
        working-directory: sentinel-sdk
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sentinel-sdk/dist/
